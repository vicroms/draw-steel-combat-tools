name: Release Module

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  MODULE_ID: draw-steel-combat-tools-vicroms

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release version and tag
        id: version
        run: |
          EXISTING_TAG="$(git tag --points-at HEAD 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
          if [ -n "$EXISTING_TAG" ]; then
            VERSION="${EXISTING_TAG#v}"
            SHOULD_CREATE_TAG=false
          else
            BASE_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)"
            if [ -n "$BASE_TAG" ]; then
              BASE_VERSION="${BASE_TAG#v}"
            else
              BASE_VERSION="$(jq -r '.version' module.json)"
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
            if ! [[ "$MAJOR" =~ ^[0-9]+$ && "$MINOR" =~ ^[0-9]+$ && "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::Cannot derive semantic version from '$BASE_VERSION'"
              exit 1
            fi
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            EXISTING_TAG="v${VERSION}"
            SHOULD_CREATE_TAG=true
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$EXISTING_TAG" >> "$GITHUB_OUTPUT"
          echo "should_create_tag=$SHOULD_CREATE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.should_create_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Update module.json with release metadata
        run: |
          jq \
            --arg moduleId "${{ env.MODULE_ID }}" \
            --arg version "${{ steps.version.outputs.version }}" \
            --arg url "https://github.com/${{ github.repository }}" \
            --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/${{ env.MODULE_ID }}.zip" \
            '.id = $moduleId | .version = $version | .url = $url | .manifest = $manifest | .download = $download' \
            module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create module zip
        run: |
          zip -r "${{ env.MODULE_ID }}.zip" \
            module.json \
            LICENSE \
            README.md \
            src/ \
            styles/ \
            lang/ \
            assets/ \
            templates/ \
            packs/

      - name: Create or update GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: "${{ steps.version.outputs.tag }}"
          commit: "${{ github.sha }}"
          artifacts: "${{ env.MODULE_ID }}.zip,module.json"
          generateReleaseNotes: true
          allowUpdates: true
